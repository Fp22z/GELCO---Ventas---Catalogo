<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas por Catálogo Perú - Login</title>
    <link rel="stylesheet" href="style-login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-image">
            <img src="../../assets/img-fondo.jpg" alt="Ventas por Catálogo Belleza">
        </div>

        <div class="login-form-section">
            <div class="form-content">
                <img src="../../assets/logo-empresa.png" alt="Logo" class="logo">
                <h1>¡Bienvenid@!</h1>
                <p>Gestiona tus ventas, capacitaciones y pedidos en un solo lugar.</p>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-login">Ingresar al Sistema</button>
                </form>

                <div class="form-footer">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                    <p>¿No eres consultora? <a href="#">Regístrate aquí</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
